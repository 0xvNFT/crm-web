name: Deploy
permissions:
  contents: read

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only deploy on branch pushes — tagging already means the code is deployed
    if: github.ref_type == 'branch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # VITE_* vars are baked into the bundle at build time — .env.production is gitignored.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_REGISTRATION_ENABLED: ${{ secrets.VITE_REGISTRATION_ENABLED }}
          VITE_BILLING_ENABLED: ${{ secrets.VITE_BILLING_ENABLED }}

      - name: Ensure deploy directory is writable
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/crm-web
            sudo chown -R $USER:$USER /var/www/crm-web

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/
          target: /var/www/crm-web
          strip_components: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only runs when a vX.X.X tag is pushed — not on every branch push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
